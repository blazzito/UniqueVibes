<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MT HUD</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app" class="hidden">
        <div class="location-container hidden">
            <div class="street-container">
                <div class="icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/><circle cx="12" cy="10" r="3"/></svg>
                </div>
                <div class="text-content">
                    <div id="zone-name" class="cardinal">LOS SANTOS</div>
                    <div id="street-name" class="street-name">VINEYARD BLVD</div>
                </div>
            </div>
        </div>

        <div class="vitals-container">
            <div class="status-item" id="armor">
                <svg class="status-circle" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" class="inner-bg"></circle>
                    <circle cx="50" cy="50" r="45" class="ring-bg"></circle>
                    <g class="segments"></g>
                </svg>
                <div class="status-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></svg>
                </div>
            </div>
            <div class="status-item" id="health">
                <svg class="status-circle" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" class="inner-bg"></circle>
                    <circle cx="50" cy="50" r="45" class="ring-bg"></circle>
                    <g class="segments"></g>
                </svg>
                <div class="status-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
                </div>
            </div>
            <div class="status-item" id="hunger">
                <svg class="status-circle" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" class="inner-bg"></circle>
                    <circle cx="50" cy="50" r="45" class="ring-bg"></circle>
                    <g class="segments"></g>
                </svg>
                <div class="status-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a5 5 0 0 1 5 5v3a5 5 0 0 1-10 0V7a5 5 0 0 1 5-5zM12 18v3m-3-3v3m6-3v3M5 14h14"/></svg>
                </div>
            </div>
            <div class="status-item" id="thirst">
                <svg class="status-circle" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" class="inner-bg"></circle>
                    <circle cx="50" cy="50" r="45" class="ring-bg"></circle>
                    <g class="segments"></g>
                </svg>
                <div class="status-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5s-3 3.5-3 5.5a7 7 0 0 0 7 7Z"/></svg>
                </div>
            </div>
            <div class="status-item" id="stamina">
                <svg class="status-circle" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" class="inner-bg"></circle>
                    <circle cx="50" cy="50" r="45" class="ring-bg"></circle>
                    <g class="segments"></g>
                </svg>
                <div class="status-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                </div>
            </div>
            <div class="status-item" id="oxygen">
                <svg class="status-circle" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" class="inner-bg"></circle>
                    <circle cx="50" cy="50" r="45" class="ring-bg"></circle>
                    <g class="segments"></g>
                </svg>
                <div class="status-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 12h12M6 8h12M6 16h12"/></svg>
                </div>
            </div>
        </div>

        <div id="car-hud" class="hidden">
            <div class="speed-label">VELOCIDAD</div>
            <div class="rpm-bar-segmented">
                <div class="rpm-segment" data-id="1"></div>
                <div class="rpm-segment" data-id="2"></div>
                <div class="rpm-segment" data-id="3"></div>
                <div class="rpm-segment" data-id="4"></div>
                <div class="rpm-segment" data-id="5"></div>
                <div class="rpm-segment" data-id="6"></div>
                <div class="rpm-segment" data-id="7"></div>
                <div class="rpm-segment" data-id="8"></div>
                <div class="rpm-segment" data-id="9"></div>
                <div class="rpm-segment" data-id="10"></div>
                <div class="rpm-segment" data-id="11"></div>
                <div class="rpm-segment" data-id="12"></div>
                <div class="rpm-segment" data-id="13"></div>
                <div class="rpm-segment" data-id="14"></div>
                <div class="rpm-segment" data-id="15"></div>
            </div>
            <div class="car-panel">
                <div class="car-item">
                    <div class="item-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M2 12h20M12 12l8-8M12 12l-8 8"/></svg>
                    </div>
                    <div class="item-content-row">
                        <div id="kms-value" class="item-value">0</div>
                        <div class="item-unit">KM</div>
                    </div>
                </div>

                <div class="car-item engine-item">
                    <div class="item-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    </div>
                    <div id="engine-value" class="item-value">100%</div>
                </div>

                <div class="speed-item car-item">
                    <div id="speed" class="speed-value">0</div>
                </div>

                <div class="car-item fuel-item">
                    <div class="item-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 22V8a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v14M7 22V11a1 1 0 0 1 1-1h4a1 1 0 0 1 1-1v11m6-3h3m-3-4h3m-3-4h3M21 7v12"/></svg>
                    </div>
                    <div id="fuel-value" class="item-value">100%</div>
                </div>

                <div class="car-item gear-item">
                    <div class="gear-section">
                        <div class="gear-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h18M3 6h18M3 18h18M9 6v12M15 6v12"/></svg>
                        </div>
                        <div id="gear" class="item-value">N</div>
                    </div>
                    <div class="vertical-separator"></div>
                    <div id="belt-icon" class="seatbelt-icon blink">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2h4M10 22h4M7 21a1 1 0 0 1-1-1v-2a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1ZM7 3a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V4a1 1 0 0 0-1-1ZM10 7v10m4-10v10"/></svg>
                    </div>
                </div>
            </div>

        </div>
    </div>
    <div id="screen-fade"></div>
    <script src="script.js"></script>
</body>
</html>
